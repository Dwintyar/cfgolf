<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <style>
      html { background-color: #0a1a12; }
      body { background-color: #0a1a12; margin: 0; }
      #root { min-height: 100vh; background-color: #0a1a12; }
    </style>
    <link rel="icon" href="/favicon.png" type="image/png" media="(prefers-color-scheme: dark)" />
    <link rel="icon" href="/favicon-light.png" type="image/png" media="(prefers-color-scheme: light)" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GolfBuana · Play. Connect. Compete.</title>
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#1D9E75" />
    <meta name="apple-mobile-web-app-capable" content="yes" />

    <meta name="apple-mobile-web-app-title" content="GB" />
    <link rel="apple-touch-icon" href="/favicon.png" />
    <meta name="description" content="GolfBuana · Play. Connect. Compete. — Your golf community platform. Meet golfers, join tournaments, track your handicap.">
    <meta name="author" content="GB" />
    <meta property="og:type" content="website" />
    <meta property="og:image" content="https://pub-bb2e103a32db4e198524a2e9ed8f35b4.r2.dev/7ec64287-619f-46be-afbc-45ae73e61abe/id-preview-706c0005--9ed356af-e387-4a18-98c2-5f46edc89a73.lovable.app-1773335810452.png">
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:site" content="@GolfBuana" />
    <meta name="twitter:image" content="https://pub-bb2e103a32db4e198524a2e9ed8f35b4.r2.dev/7ec64287-619f-46be-afbc-45ae73e61abe/id-preview-706c0005--9ed356af-e387-4a18-98c2-5f46edc89a73.lovable.app-1773335810452.png">
    <meta property="og:title" content="GB">
    <meta name="twitter:title" content="GB">
    <meta property="og:description" content="GolfBuana · Play. Connect. Compete. — Your golf community platform. Meet golfers, join tournaments, track your handicap.">
    <meta name="twitter:description" content="GolfBuana · Play. Connect. Compete. — Your golf community platform. Meet golfers, join tournaments, track your handicap.">
</head>

  <body>
    <div id="root"></div>

    <!-- Splash screen — visible before React mounts -->
    <div id="splash" style="
      position:fixed; inset:0; z-index:9999;
      background:#0a1a12;
      display:flex; flex-direction:column;
      align-items:center; justify-content:center;
      gap:0;
      font-family:'Segoe UI',system-ui,sans-serif;
      transition:opacity 0.4s ease;
    ">
      <!-- App name -->
      <p style="
        color:#ffffff; font-size:26px; font-weight:800;
        letter-spacing:-0.5px; margin:0 0 28px 0;
      ">GolfBuana</p>

      <!-- Logo dark mode SVG inline -->
      <img src="/logo-gb-dark.svg" style="width:140px;height:140px;object-fit:contain;" />

      <!-- Taglines -->
      <div style="margin-top:32px; display:flex; flex-direction:column; align-items:center; gap:8px;">
        <p style="color:#4ade80;font-size:14px;font-weight:600;margin:0;letter-spacing:0.5px;">⛳ Fair Play</p>
        <p style="color:#4ade80;font-size:14px;font-weight:600;margin:0;letter-spacing:0.5px;">🤝 Fellowship</p>
        <p style="color:#4ade80;font-size:14px;font-weight:600;margin:0;letter-spacing:0.5px;">🏆 Fun Competition</p>
      </div>
    </div>

    <script type="module" src="/src/main.tsx"></script>
    <script>
      // Hide splash when React has mounted
      (function() {
        var splash = document.getElementById('splash');
        if (!splash) return;
        var observer = new MutationObserver(function() {
          var root = document.getElementById('root');
          if (root && root.children.length > 0) {
            splash.style.opacity = '0';
            setTimeout(function() { splash.style.display = 'none'; }, 400);
            observer.disconnect();
          }
        });
        observer.observe(document.getElementById('root'), { childList: true });
      })();

      // Register service worker on load (required for PWA/TWA)
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', function() {
          navigator.serviceWorker.register('/sw.js', { scope: '/' })
            .catch(function(err) { console.warn('SW registration failed:', err); });
        });
      }
    </script>
  </body>
</html>
